<!DOCTYPE html>
<html>
<head>
    <title>Panel de Monitoreo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/monitor.css') }}">
<body>
    <h1>Control de Personal - Hoy</h1>
    
    <div class="flex-container">
        <div id="map"></div>

        <div class="sidebar">
            <h3>Estado de Turnos</h3>
            
            <h4>✅ Activos (En sitio):</h4>
            <ul>
                {% for a in activos %}
                <li><strong>{{ a.usuario }}</strong> <span class="status-badge online">Visto: {{ a.fecha.split(' ')[1] }}</span></li>
                {% endfor %}
            </ul>

            <h4>❌ Faltan de Iniciar:</h4>
            <ul>
                {% for f in faltantes %}
                <li>{{ f }} <span class="status-badge offline">Ausente</span></li>
                {% endfor %}
            </ul>

            <hr>
            <button class="btn-email" onclick="enviarRecordatorio()">📧 Enviar Recordatorio Grupal</button>
            <p id="email-status" style="font-size: 12px; color: green;"></p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([19.4326, -99.1332], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Marcadores solo de los que están ACTIVOS ahora
        var activos = {{ activos | tojson }};
        activos.forEach(r => {
            L.marker([r.lat, r.lon]).addTo(map)
                .bindPopup(`<b>${r.usuario}</b><br>Último reporte: ${r.fecha}`);
        });

        function enviarRecordatorio() {
            document.getElementById('email-status').innerText = "Enviando...";
            fetch('/send-reminders')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('email-status').innerText = "¡Correos enviados con éxito!";
                });
        }
    </script>
</body>
</html>
